<!DOCTYPE html>

<header class="page-header">
<h1>日常勤行</h1>
<p>Daily Buddhist Services</p>

<section class="service-area">

<!-- 逮夜 -->
<div class="service-item">

<h2 class="service-title">逮夜</h2>

<div class="service-content">

<div class="service-img">
<img src="images/IMG_5472.JPG" alt="逮夜">

<div class="service-text">
<p>
ご命日の前夜に行うお勤めです。<br>

</div>

</div>

</div>


<!-- 祥月 -->
<div class="service-item">

<h2 class="service-title">祥月命日</h2>

<div class="service-content">

<div class="service-img">

</div>

<div class="service-text">
<p>
亡くなられた方のご命日に行う法要です。<br>
仏さまのみ教えを聞き、故人を偲びます。
</p>
</div>

</div>

</div>


<!-- 法事 -->
<div class="service-item">

<h2 class="service-title">法事</h2>

<div class="service-content">

<div class="service-text">
<p>

</p>
</div>

</div>

</div>

</div>

</div>
