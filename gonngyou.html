<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>日常勤行｜西光寺</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header">
<h1>日常勤行</h1>
<p>Daily Buddhist Services</p>
</header>


<section class="service-area">

<!-- 逮夜 -->
<div class="service-item">

<h2 class="service-title">逮夜</h2>

<div class="service-content">

<div class="service-img">
<img src="images/taiya.jpg" alt="逮夜">
</div>

<div class="service-text">
<p>
ご命日の前夜に行うお勤めです。<br>
ご家族で仏さまのみ教えを聞くご縁となります。
</p>
</div>

</div>

</div>


<!-- 祥月 -->
<div class="service-item">

<h2 class="service-title">祥月命日</h2>

<div class="service-content">

<div class="service-img">
<img src="images/syougetsu.jpg" alt="祥月命日">
</div>

<div class="service-text">
<p>
亡くなられた方のご命日に行う法要です。<br>
仏さまのみ教えを聞き、故人を偲びます。
</p>
</div>

</div>

</div>


<!-- 法事 -->
<div class="service-item">

<h2 class="service-title">法事</h2>

<div class="service-content">

<div class="service-img">
<img src="images/houji.jpg" alt="法事">
</div>

<div class="service-text">
<p>
年忌法要などのご法事をお勤めいたします。<br>
ご自宅・お寺どちらでも対応いたします。
</p>
</div>

</div>

</div>


<!-- 入仏遷仏 -->
<div class="service-item">

<h2 class="service-title">入仏・遷仏</h2>

<div class="service-content">

<div class="service-img">
<img src="images/nyubutsu.jpg" alt="入仏遷仏">
</div>

<div class="service-text">
<p>
新しいお仏壇を迎える際の入仏法要、<br>
移動の際の遷仏法要をお勤めいたします。
</p>
</div>

</div>

</div>

</section>

</body>
</html>
