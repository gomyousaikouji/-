    </div>

    <div class="form-group">
      <label>住所</label>
      <input type="text" placeholder="ご住所">
    </div>

    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" placeholder="example@gmail.com">
    </div>

    <div class="form-group">
      <label>電話番号</label>
      <input type="tel" placeholder="090-1234-5678">
    </div>

    <div class="form-group">
      <label>お問い合わせ内容</label>
      <textarea rows="6" placeholder="お問い合わせ内容をご入力ください"></textarea>
    </div>
